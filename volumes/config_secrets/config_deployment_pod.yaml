apiVersion: apps/v1
kind: Deployment
metadata:
  name: configmap-env-pod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: config-env
  strategy:
    type: RollingUpdate             # Update pods one by one without downtime
    rollingUpdate:
      maxSurge: 2                   # Max 2 extra pods allowed during update
      maxUnavailable: 1
  template:                           # Template for the Pods to be created
    metadata:
      labels:
        app: config-env   # Label that must match the selector
    spec:
      containers:
      - name: app
        image: nginx
        volumeMounts:
        - name: app-config
          mountPath: /etc/config
      volumes:
      - name: app-config
        configMap:
          name: app-config

