apiVersion: v1
kind: ResourceQuota
metadata:
  name: pod-quota
  namespace: dev
spec:
  hard:
    pods: "5"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: namespace-quota
  namespace: dev
spec:
  hard:
    pods: "10"
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
