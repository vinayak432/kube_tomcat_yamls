apiVersion: apps/v1
kind: ReplicaSet

metadata:
  name: tomcat-rs

spec:
  replicas: 2

  selector:
    matchLabels:
      app: tomcat

  template:
    metadata:
      labels:
        app: tomcat

    spec:
      containers:
      - name: tomcat
        image: tomcat:9
        ports:
        - containerPort: 8080
