apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jenkins-helm-ingress
  namespace: jenkins-helm-ns
spec:
  ingressClassName: nginx
  rules:
  - host: 
    http:
      paths:
        - path: /vinayak
          pathType: Prefix
          backend:
            service:
              name: jenkins-helm-svc
              port:
                number: 8080
